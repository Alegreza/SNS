services:
  - type: web
    name: cksns
    runtime: node
    buildCommand: npm run install:server
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: cksns-db
          property: connectionString

databases:
  - name: cksns-db
    databaseName: cksns
    user: cksns
    plan: free
